<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="stationTitle">Station - Hail Data Download</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            padding: 2rem 0;
        }
        .filter-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        .files-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .station-header {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            padding: 1.5rem;
        }
        .station-title {
            color: #333;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .file-table {
            background: transparent;
        }
        .file-table th {
            background: #f8f9fa;
            border: none;
            color: #333;
            font-weight: 600;
        }
        .file-table td {
            border: none;
            vertical-align: middle;
        }
        .file-row:hover {
            background: #f8f9fa;
        }
        .download-btn {
            background: #667eea;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        .no-files {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
        }
        .station-dropdown {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.5rem;
        }
        .filter-btn {
            background: #28a745;
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .filter-btn:hover {
            background: #218838;
        }
        .reset-btn {
            background: #6c757d;
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <!-- Station Header -->
        <div class="station-header">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h2 class="station-title">
                        <i class="bi bi-broadcast"></i> <span id="stationName">Station</span> Station
                    </h2>
                    <p class="text-muted mb-0">Browse and download hail data files</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="index.html" class="back-btn me-2">
                        <i class="bi bi-arrow-left"></i> Back to Stations
                    </a>
                    <select class="station-dropdown" id="stationDropdown" onchange="switchStation(this.value)">
                        <option value="">Loading...</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Filter Card -->
        <div class="filter-card p-4">
            <h5 class="mb-3"><i class="bi bi-funnel"></i> Filter by Date</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="startDate" class="form-label">Start Date</label>
                    <input type="date" class="form-control" id="startDate">
                </div>
                <div class="col-md-4">
                    <label for="endDate" class="form-label">End Date</label>
                    <input type="date" class="form-control" id="endDate">
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <div class="d-flex gap-2">
                        <button class="btn filter-btn" onclick="filterFiles()">
                            <i class="bi bi-search"></i> Filter
                        </button>
                        <button class="btn reset-btn" onclick="resetFilter()">
                            <i class="bi bi-arrow-clockwise"></i> Reset
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Files Card -->
        <div class="files-card p-4">
            <h5 class="mb-3"><i class="bi bi-file-earmark-zip"></i> Data Files</h5>
            
            <div id="filesContainer">
                <div class="loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Loading files...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let fileData = {};
        let currentStation = '';
        let allFiles = [];
        
        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadStationData();
        });
        
        function loadStationData() {
            // Get station from URL or localStorage
            const urlParams = new URLSearchParams(window.location.search);
            currentStation = urlParams.get('station') || localStorage.getItem('selectedStation');
            
            if (!currentStation) {
                window.location.href = 'index.html';
                return;
            }
            
            // Load file data
            const storedData = localStorage.getItem('fileData');
            if (storedData) {
                fileData = JSON.parse(storedData);
                initializePage();
            } else {
                // Load from JSON file
                loadFileDataFromJSON();
            }
        }
        
        async function loadFileDataFromJSON() {
            try {
                const response = await fetch('files.json');
                if (!response.ok) {
                    throw new Error('Failed to load file data');
                }
                fileData = await response.json();
                initializePage();
            } catch (error) {
                console.error('Error loading file data:', error);
                displayError();
            }
        }
        
        function initializePage() {
            // Update page title
            document.getElementById('stationName').textContent = currentStation;
            document.getElementById('stationTitle').textContent = `${currentStation} - Hail Data Download`;
            
            // Populate station dropdown
            populateStationDropdown();
            
            // Load files for current station
            loadFiles();
        }
        
        function populateStationDropdown() {
            const dropdown = document.getElementById('stationDropdown');
            const stations = Object.keys(fileData);
            
            let html = '';
            stations.forEach(station => {
                const selected = station === currentStation ? 'selected' : '';
                html += `<option value="${station}" ${selected}>${station}</option>`;
            });
            
            dropdown.innerHTML = html;
        }
        
        function loadFiles(startDate = null, endDate = null) {
            const container = document.getElementById('filesContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Loading files...</p>
                </div>
            `;
            
            const files = fileData[currentStation] || [];
            allFiles = files;
            
            // Apply date filters
            let filteredFiles = files;
            if (startDate) {
                filteredFiles = filteredFiles.filter(file => file.date >= startDate);
            }
            if (endDate) {
                filteredFiles = filteredFiles.filter(file => file.date <= endDate);
            }
            
            displayFiles(filteredFiles);
        }
        
        function displayFiles(files) {
            const container = document.getElementById('filesContainer');
            
            if (files.length === 0) {
                container.innerHTML = `
                    <div class="no-files">
                        <i class="bi bi-inbox" style="font-size: 3rem; color: #6c757d;"></i>
                        <p class="mt-2">No files found for the selected criteria.</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="table-responsive">
                    <table class="table file-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Filename</th>
                                <th>Size</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            files.forEach(file => {
                html += `
                    <tr class="file-row">
                        <td>${file.date}</td>
                        <td><code>${file.filename}</code></td>
                        <td>${file.size}</td>
                        <td>
                            <a href="${file.url}" class="download-btn" target="_blank">
                                <i class="bi bi-download"></i> Download
                            </a>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
                <div class="mt-3">
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i> 
                        Showing ${files.length} file${files.length !== 1 ? 's' : ''} of ${allFiles.length} total
                    </small>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function filterFiles() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            loadFiles(startDate, endDate);
        }
        
        function resetFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            loadFiles();
        }
        
        function switchStation(station) {
            if (station && station !== currentStation) {
                window.location.href = `station.html?station=${station}`;
            }
        }
        
        function displayError() {
            const container = document.getElementById('filesContainer');
            container.innerHTML = `
                <div class="no-files">
                    <i class="bi bi-exclamation-triangle" style="font-size: 3rem; color: #dc3545;"></i>
                    <p class="mt-2">Error loading files. Please try again.</p>
                </div>
            `;
        }
        
        // Allow Enter key to trigger filter
        document.getElementById('startDate').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') filterFiles();
        });
        
        document.getElementById('endDate').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') filterFiles();
        });
    </script>
</body>
</html>
