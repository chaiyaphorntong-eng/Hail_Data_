<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hail Data Download -  stations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            padding: 2rem 0;
        }
        .station-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }
        .station-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .station-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }
        .station-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .station-subtitle {
            color: #666;
            font-size: 0.9rem;
        }
        .station-count {
            background: #28a745;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .header-title {
            color: white;
            text-align: center;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .header-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .header-title p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
        }
        .error {
            text-align: center;
            padding: 3rem;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="header-title">
            <h1><i class="bi bi-cloud-download"></i> Hail Data Download</h1>
            <p>Download radar hail data by station and date</p>
        </div>
        
        <div id="stationsContainer" class="row">
            <div class="loading">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading radar stations...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let fileData = {};
        
        // Load file data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadFileData();
        });
        
        async function loadFileData() {
            try {
                const response = await fetch('files.json');
                if (!response.ok) {
                    throw new Error('Failed to load file data');
                }
                fileData = await response.json();
                displayStations();
            } catch (error) {
                console.error('Error loading file data:', error);
                displayError();
            }
        }
        
        function displayStations() {
            const container = document.getElementById('stationsContainer');
            
            const stations = Object.keys(fileData);
            
            let html = '';
            stations.forEach(station => {
                const fileCount = fileData[station].length;
                const latestDate = fileData[station][0]?.date || 'N/A';
                
                html += `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="station-card p-4 text-center" onclick="goToStation('${station}')">
                            <div class="station-icon">
                                <i class="bi bi-broadcast"></i>
                            </div>
                            <h3 class="station-title">${station}</h3>
                            <p class="station-subtitle">Latest: ${latestDate}</p>
                            <span class="station-count">${fileCount} files</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function displayError() {
            const container = document.getElementById('stationsContainer');
            container.innerHTML = `
                <div class="error">
                    <i class="bi bi-exclamation-triangle" style="font-size: 3rem;"></i>
                    <p class="mt-2">Failed to load data. Please try again later.</p>
                </div>
            `;
        }
        
        function goToStation(station) {
            // Store station data in localStorage
            localStorage.setItem('selectedStation', station);
            localStorage.setItem('fileData', JSON.stringify(fileData));
            
            // Redirect to station page
            window.location.href = `station.html?station=${station}`;
        }
    </script>
</body>
</html>
